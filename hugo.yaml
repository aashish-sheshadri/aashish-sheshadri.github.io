baseURL: https://aashish-sheshadri.github.io/
locale: en-us
title: Aashish Sheshadri
theme: PaperMod

paginate: 10

params:
  env: production
  title: Aashish Sheshadri
  description: "Writing about ML systems, infrastructure, and what happens when you try to make them work at scale."
  author: Aashish Sheshadri

  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false

  homeInfoParams:
    Title: "Hi, I'm Aashish"
    Content: >
      Platform architect. I write about ML systems, reinforcement learning,
      infrastructure, and the engineering that makes them work at scale.

  socialIcons:
    - name: linkedin
      url: "https://www.linkedin.com/in/aashish-sheshadri/"
    - name: github
      url: "https://github.com/aashish-sheshadri"

  assets:
    favicon: "/favicon.ico"

  cover:
    linkFullImages: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  highlight:
    codeFences: true
    guessSyntax: true
    lineNos: false
    style: monokai

menu:
  main:
    - identifier: series
      name: Series
      url: /series/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30
    - identifier: search
      name: Search
      url: /search/
      weight: 40
